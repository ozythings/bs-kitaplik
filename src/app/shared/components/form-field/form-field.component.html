<div class="mb-4">
  <label class="block text-sm font-medium text-gray-700 mb-1">
    {{ label() }}
    @if (required()) { <span class="text-red-500">*</span> }
  </label>
  <ng-content />
  @if (control() && control()!.invalid && (control()!.dirty || control()!.touched)) {
    <p class="mt-1 text-sm text-red-600">{{ getError() }}</p>
  }
</div>
