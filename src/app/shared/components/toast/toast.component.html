@for (n of notifications(); track n.id; let i = $index) {
  <div
    class="fixed left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-lg shadow-lg text-white text-sm transition-all duration-300"
    [style.top]="(4 + i * 60) + 'px'"
    [class.bg-green-600]="n.type === 'success'"
    [class.bg-red-600]="n.type === 'error'"
    [class.bg-blue-600]="n.type === 'info'"
  >
    {{ n.message }}
  </div>
}
